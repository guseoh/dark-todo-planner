name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: Test, build, and audit
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:../data/ci.db
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm run test:ci

      - name: Build app
        run: npm run build

      - name: Build GitHub Pages bundle
        run: npm run build:pages

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        run: docker build .
