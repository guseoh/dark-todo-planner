services:
  todo-planner:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:../data/prod.db}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
